name: Validate Skill

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate skill package
        run: python tools/validate_skill_package.py

      - name: Validate evaluation contract
        run: python tools/validate_evals.py

      - name: Run tests
        run: python -m unittest discover -s tests -v
